{% extends 'base.html' %}
{% load static %}

{% block title %}404 — Page Not Found — DriveBay{% endblock %}

{% block content %}
<div class="container py-5 text-center">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="car-card p-5">
                <i class="bi bi-signpost-2 text-accent" style="font-size:5rem;"></i>
                <h1 style="font-size:5rem; font-weight:800; color:var(--accent); margin-top:1rem;">404</h1>
                <h4 style="color:var(--text-primary); font-weight:600;">Page Not Found</h4>
                <p style="color:var(--text-muted); margin-top:1rem;">
                    The page you are looking for doesn't exist or has been moved.
                </p>
                <div class="d-flex gap-3 justify-content-center mt-4">
                    <a href="/" class="btn btn-accent">
                        <i class="bi bi-house me-2"></i>Go Home
                    </a>
                    <a href="/cars/" class="btn btn-dark-outline">
                        <i class="bi bi-car-front me-2"></i>Browse Cars
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
