{% load static %}
<a href="/cars/{{ car.id }}/" class="text-decoration-none">
    <div style="display:flex; align-items:center; gap:1rem; padding:0.75rem;
                background:var(--bg-input); border-radius:var(--radius);
                margin-bottom:0.5rem; transition:var(--transition);"
        class="dashboard-car-row">
        {% if car.image %}
            <img src="{{ car.image.url }}" alt="{{ car }}"
                style="width:70px; height:50px; object-fit:cover; border-radius:6px; flex-shrink:0;">
        {% else %}
            <div style="width:70px; height:50px; background:var(--bg-secondary);
                        border-radius:6px; display:flex; align-items:center;
                        justify-content:center; flex-shrink:0;">
                <i class="bi bi-car-front" style="color:var(--text-muted);"></i>
            </div>
        {% endif %}
        <div style="flex:1; min-width:0;">
            <div style="font-size:0.9rem; font-weight:600; color:var(--text-primary);
                        white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">
                {{ car.year }} {{ car.make }} {{ car.car_model }}
            </div>
            <div style="font-size:0.8rem; color:var(--accent);">€{{ car.price|floatformat:0 }}</div>
        </div>
        <i class="bi bi-chevron-right" style="color:var(--text-muted); flex-shrink:0;"></i>
    </div>
</a>
