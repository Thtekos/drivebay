{% load static %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="car-card p-4 p-md-5">
                <div class="text-center mb-4">
                    <a href="/" style="font-size: 1.8rem; font-weight: 700; color: var(--accent);">
                        Drive<span style="color: var(--text-primary);">Bay</span>
                    </a>
                    <h5 class="mt-3" style="color: var(--text-primary);">{% block auth_title %}{% endblock %}</h5>
                    <p style="color: var(--text-muted); font-size: 0.875rem;">{% block auth_subtitle %}{% endblock %}</p>
                </div>
                {% block auth_form %}{% endblock %}
                <div class="text-center mt-3" style="font-size: 0.875rem; color: var(--text-muted);">
                    {% block auth_footer %}{% endblock %}
                </div>
            </div>
        </div>
    </div>
</div>
