{% extends 'base.html' %}
{% load static %}

{% block title %}Login — DriveBay{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="car-card p-4 p-md-5">

                <div class="text-center mb-4">
                    <a href="/" style="font-size: 1.8rem; font-weight: 700; color: var(--accent);">
                        Drive<span style="color: var(--text-primary);">Bay</span>
                    </a>
                    <h5 class="mt-3" style="color: var(--text-primary);">Welcome back</h5>
                    <p style="color: var(--text-muted); font-size: 0.875rem;">Login to your DriveBay account</p>
                </div>

                <form method="POST" action="/login/">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input type="text" name="username" class="form-control" required
                            value="{{ username|default:'' }}" placeholder="Your username">
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" class="form-control"
                            required placeholder="Your password">
                    </div>

                    <button type="submit" class="btn btn-accent w-100">
                        <i class="bi bi-box-arrow-in-right me-2"></i>Login
                    </button>
                </form>

                <div class="text-center mt-3" style="font-size: 0.875rem; color: var(--text-muted);">
                    Don't have an account? <a href="/register/">Register free</a>
                </div>

            </div>
        </div>
    </div>
</div>
{% endblock %}
