{% extends 'base.html' %}
{% load static %}

{% block title %}500 — Server Error — DriveBay{% endblock %}

{% block content %}
<div class="container py-5 text-center">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="car-card p-5">
                <i class="bi bi-exclamation-triangle text-accent" style="font-size:5rem;"></i>
                <h1 style="font-size:5rem; font-weight:800; color:var(--accent); margin-top:1rem;">500</h1>
                <h4 style="color:var(--text-primary); font-weight:600;">Server Error</h4>
                <p style="color:var(--text-muted); margin-top:1rem;">
                    Something went wrong on our end. We're working on it.
                </p>
                <div class="d-flex gap-3 justify-content-center mt-4">
                    <a href="/" class="btn btn-accent">
                        <i class="bi bi-house me-2"></i>Go Home
                    </a>
                    <a href="javascript:history.back()" class="btn btn-dark-outline">
                        <i class="bi bi-arrow-left me-2"></i>Go Back
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
